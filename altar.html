<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanatana Tamil - Altar Agung Mahakudus</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght=600;700;900&family=Plus+Jakarta+Sans:wght=300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020100; }
    .font-serif-royal { font-family: 'Cinzel', serif; }
    .font-serif-ultra { font-family: 'Cinzel Decorative', serif; }
    
    @keyframes cosmicGlow {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.1); }
    }
    .cosmic-glow { animation: cosmicGlow 12s ease-in-out infinite; }

    @keyframes bellRing {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(20deg); filter: drop-shadow(0 0 20px #f59e0b); }
      40% { transform: rotate(-15deg); }
      60% { transform: rotate(10deg); }
      80% { transform: rotate(-5deg); }
    }
    .animate-bell { animation: bellRing 0.6s ease-in-out; }

    .gold-border-glow {
      box-shadow: 0 0 50px -10px rgba(217, 119, 6, 0.4), inset 0 0 30px rgba(217, 119, 6, 0.15);
    }
    canvas { pointer-events: none; }
  </style>
</head>
<body class="text-stone-200 min-h-screen flex flex-col items-center justify-start p-4 md:p-8 relative overflow-x-hidden">

  <audio id="bellAudio" src="bell.mp3" preload="auto"></audio>
  <audio id="chantsAudio" src="chants.mp3" loop preload="auto"></audio>

  <canvas id="flowerCanvas" class="absolute inset-0 w-full h-full hidden z-50"></canvas>

  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[900px] h-[900px] bg-gradient-to-b from-amber-500/10 via-orange-600/5 to-transparent rounded-full blur-[140px] cosmic-glow pointer-events-none"></div>

  <div class="w-full max-w-xl space-y-6 z-10">
    
    <header class="w-full flex justify-between items-center bg-stone-900/60 border border-amber-500/20 backdrop-blur-xl p-4 rounded-2xl shadow-xl">
      <div class="flex flex-col">
        <span class="text-[9px] tracking-[0.4em] uppercase font-bold text-amber-500">Sanctum Menu</span>
        <h1 class="text-sm font-black font-serif-royal tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-orange-400">SANATANA TAMIL</h1>
      </div>
      <div class="flex gap-2">
        <button id="ambientBtn" class="text-[9px] tracking-widest font-bold uppercase bg-stone-950 border border-amber-500/30 hover:border-amber-400 text-amber-400 py-2 px-3 rounded-xl transition-all duration-300 cursor-pointer flex items-center gap-1.5">
          <span id="ambientIcon">📿</span> <span id="ambientText">Nyalakan Mantra</span>
        </button>
        <a href="dashboard.html" class="text-[9px] tracking-widest font-bold uppercase bg-stone-950 border border-stone-800 hover:border-amber-500/40 text-stone-400 hover:text-amber-300 py-2 px-4 rounded-xl transition-all duration-300">
          Kembali
        </a>
      </div>
    </header>

    <div class="gold-border-glow bg-gradient-to-b from-stone-900 via-stone-950 to-stone-950 border-2 border-amber-500/30 rounded-[3rem] p-6 md:p-8 text-center relative space-y-6 shadow-2xl">
      <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-gradient-to-r from-amber-500 to-orange-600 text-stone-950 text-[9px] tracking-[0.3em] uppercase font-black px-5 py-1.5 rounded-full border border-amber-300/30">
        Maha Sannidhanam (Altar Harian)
      </div>

      <div class="space-y-1 pt-2">
        <h2 id="deityName" class="text-3xl font-black font-serif-royal text-transparent bg-clip-text bg-gradient-to-b from-amber-100 via-amber-400 to-amber-600 tracking-wide">Loading...</h2>
        <p id="deityTamil" class="text-orange-500 text-xl font-bold tracking-[0.2em]">-</p>
      </div>

      <div class="w-full h-[500px] bg-stone-950 rounded-[2.5rem] border border-amber-500/10 overflow-hidden relative shadow-inner">
        <img id="deityImage" src="" alt="Dewa Peradaban Tamil" class="w-full h-full object-cover opacity-90 transition-opacity duration-1000" />
        <div class="absolute inset-0 bg-gradient-to-t from-stone-950 via-transparent to-stone-950/20"></div>
      </div>

      <p id="deityDesc" class="text-[11px] text-stone-400 italic font-light px-4 max-w-lg mx-auto leading-relaxed">
        Memuat hikmah spiritual kosmik...
      </p>

      <div class="flex justify-center gap-12 pt-2 relative">
        <button id="bellBtn" class="w-16 h-16 bg-gradient-to-br from-yellow-300 via-amber-500 to-orange-600 text-stone-950 rounded-full flex items-center justify-center text-3xl shadow-lg transition-all duration-300 transform active:scale-90 hover:scale-105 cursor-pointer relative group">
          🔔
          <span class="absolute -bottom-6 text-[9px] tracking-widest font-bold text-stone-500 group-hover:text-amber-400 uppercase">Bunyi Genta</span>
        </button>
        
        <button id="flowerBtn" class="w-16 h-16 bg-gradient-to-br from-orange-500 via-rose-600 to-fuchsia-800 text-stone-100 rounded-full flex items-center justify-center text-3xl shadow-lg transition-all duration-300 transform active:scale-90 hover:scale-105 cursor-pointer relative group">
          🌸
          <span class="absolute -bottom-6 text-[9px] tracking-widest font-bold text-stone-500 group-hover:text-rose-400 uppercase">Tabur Puspa</span>
        </button>
      </div>
    </div>

    <div class="bg-gradient-to-b from-stone-900/80 to-stone-950/90 border border-amber-500/15 backdrop-blur-xl p-5 rounded-[2rem] text-center space-y-1 shadow-xl">
      <h4 class="text-[10px] tracking-[0.3em] uppercase text-orange-500 font-bold font-serif-royal">Mantra Agung Hari Ini</h4>
      <p class="text-base font-serif-royal text-amber-300 font-bold italic" id="deityMantra">-</p>
    </div>

    <footer class="text-center pt-2 pb-6">
      <p class="text-[9px] text-stone-600 tracking-[0.3em] uppercase font-bold">
        Sanatana Tamil Sanctum Ecosystem • Real Asset Integrated
      </p>
    </footer>

  </div>

  <script type="module">
    // DATABASE LINKED LANGSUNG KE FOTO HD PREMIUM DARI KAMU
    const deitiesDatabase = [
      {
        name: "Lord Murugan",
        tamil: "முருகன்",
        image: "1000488924.jpg",
        desc: "Dewa tertinggi pelindung bahasa, sastra, dan peradaban spiritual Tamil kuno. Pembawa tombak suci Kebijaksanaan (Vel).",
        mantra: "“Om Saravana Bhava”"
      },
      {
        name: "Lord Shiva",
        tamil: "சிவன்",
        image: "1000488925.jpg",
        desc: "Manifestasi Sang Penari Kosmik Pencipta Alam Semesta, yang detak tariannya menghasilkan ketukan ritme Sastra Tamil.",
        mantra: "“Om Namah Shivaya”"
      },
      {
        name: "Lord Ganesha",
        tamil: "பிள்ளையார்",
        image: "1000488926.jpg",
        desc: "Dewa Pembuka Gerbang dan Penghancur segala rintangan dalam menjalani kehidupan duniawi maupun perjalanan rohani.",
        mantra: "“Om Gam Ganapataye Namaha”"
      },
      {
        name: "Goddess Parvati",
        tamil: "பார்வதி",
        image: "1000488927.jpg",
        desc: "Ibu Alam Semesta, manifestasi energi suci mutlak tempat bersumbernya kekuatan perlindungan, cinta, dan pengabdian jiwa.",
        mantra: "“Om Dum Durgayei Namaha”"
      },
      {
        name: "Goddess Lakshmi",
        tamil: "லட்சுமி",
        image: "1000488928.jpg",
        desc: "Sang Dewi pembawa cahaya keberuntungan, kemakmuran spritual, kedamaian batiniah, serta harmoni seisi Istana.",
        mantra: "“Om Shreem Mahalakshmyei Namaha”"
      }
    ];

    // Logika pergantian harian otomatis berdasarkan tanggal kalender
    const currentDay = new Date().getDate();
    const todayData = deitiesDatabase[currentDay % deitiesDatabase.length];

    // Render Data ke Komponen UI HTML
    document.getElementById("deityName").innerText = todayData.name;
    document.getElementById("deityTamil").innerText = todayData.tamil;
    document.getElementById("deityImage").src = todayData.image;
    document.getElementById("deityDesc").innerText = todayData.desc;
    document.getElementById("deityMantra").innerText = todayData.mantra;

    // LOGIKA HANDLING AUDIO JALUR USER INTERACTION
    const bellAudio = document.getElementById("bellAudio");
    const chantsAudio = document.getElementById("chantsAudio");
    const ambientBtn = document.getElementById("ambientBtn");
    const ambientIcon = document.getElementById("ambientIcon");
    const ambientText = document.getElementById("ambientText");
    const bellBtn = document.getElementById("bellBtn");
    const flowerBtn = document.getElementById("flowerBtn");
    const canvas = document.getElementById("flowerCanvas");

    // Kontrol Backsound Mantra (chants.mp3)
    let isChanting = false;
    ambientBtn.addEventListener("click", () => {
      if(!isChanting) {
        chantsAudio.volume = 0.5;
        chantsAudio.play().then(() => {
          isChanting = true;
          ambientIcon.innerText = "🕉️";
          ambientText.innerText = "Matikan Mantra";
          ambientBtn.classList.add("border-orange-500", "text-orange-400");
        }).catch(err => alert("Ketuk layar sekali lagi untuk memberi izin suara pada browser!"));
      } else {
        chantsAudio.pause();
        isChanting = false;
        ambientIcon.innerText = "📿";
        ambientText.innerText = "Nyalakan Mantra";
        ambientBtn.classList.remove("border-orange-500", "text-orange-400");
      }
    });

    // Kontrol Bunyi Genta (bell.mp3)
    bellBtn.addEventListener("click", () => {
      bellBtn.classList.remove("animate-bell");
      void bellBtn.offsetWidth; 
      bellBtn.classList.add("animate-bell");
      
      bellAudio.currentTime = 0;
      bellAudio.volume = 0.7;
      bellAudio.play().catch(err => console.log("Audio tertahan proteksi autoplay browser"));
    });

    // RITUAL INTERAKTIF KELOPAK BUNGA PUSPA
    let animationId;
    flowerBtn.addEventListener("click", () => {
      canvas.classList.remove("hidden");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const flowers = Array.from({ length: 65 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * -canvas.height,
        r: Math.random() * 5 + 4,
        color: ["#fbbf24", "#f97316", "#f43f5e", "#ec4899", "#ffffff"][Math.floor(Math.random() * 5)],
        speed: Math.random() * 2 + 2.5,
        angle: Math.random() * 2
      }));

      function drawShower() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        flowers.forEach((f) => {
          f.y += f.speed; f.x += Math.sin(f.angle) * 0.7; f.angle += 0.02;
          ctx.beginPath(); ctx.fillStyle = f.color;
          ctx.ellipse(f.x, f.y, f.r, f.r * 1.3, f.angle, 0, Math.PI * 2); ctx.fill();
        });
        animationId = requestAnimationFrame(drawShower);
      }

      cancelAnimationFrame(animationId);
      drawShower();

      setTimeout(() => {
        cancelAnimationFrame(animationId);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.classList.add("hidden");
      }, 4000);
    });
  </script>
</body>
</html>
