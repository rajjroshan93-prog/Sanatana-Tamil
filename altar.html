<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Altar Kosmik Harian Navagraha</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

html, body {
  height:100%;
  overflow:hidden;
  background-color: #0c0501;
}

body {
  font-family:'Crimson Text',Georgia,serif;
  color:#e8d5a3;
  position:relative;
  width:100%;
  height:100%;
}

/* ── BACKGROUND KUIL TAMIL ── */
.bg-temple {
  position:fixed;
  inset:0;
  z-index:0;
  background-image: url('IMG_20260622_160050.png');
  background-size:cover;
  background-position:center center;
  background-repeat:no-repeat;
  filter:brightness(0.45) saturate(1.1);
}
/* Overlay gradasi dramatis agar efek emas menyala */
.bg-overlay {
  position:fixed;
  inset:0;
  z-index:1;
  background:
    radial-gradient(circle 80% 60% at 50% 40%, rgba(0,0,0,0) 20%, rgba(12,5,1,0.75) 100%),
    linear-gradient(180deg, rgba(8,3,0,0.6) 0%, transparent 30%, transparent 70%, rgba(12,5,1,0.9) 100%);
}

/* ── LILIN PREMIUM ── */
.candle-wrap {
  position:fixed; bottom:20px; z-index:20;
  display:flex; flex-direction:column; align-items:center;
}
.candle-wrap.cl{left:16px;} .candle-wrap.cr{right:16px;}
.c-halo{width:40px;height:65px;background:radial-gradient(ellipse at 50% 90%,rgba(255,150,20,0.65) 0%,transparent 72%);margin-bottom:-15px;}
.c-flame{width:13px;height:26px;background:radial-gradient(ellipse at 50% 70%,#fff 0%,#ffe566 35%,#ff7700 75%,transparent 100%);border-radius:50% 50% 35% 35%;animation:flicker 1s infinite alternate;filter:blur(.2px);position:relative;z-index:2;}
.c-wax{width:16px;height:95px;background:linear-gradient(135deg,#f0dfb3 0%,#fffbe8 40%,#b59255 100%);border-radius:4px;box-shadow:0 0 20px rgba(255,190,40,0.45);}
.c-base{width:26px;height:10px;background:linear-gradient(90deg,#61440b,#FFD700,#61440b);border-radius:2px;}

@keyframes flicker{
  0%{transform:scaleX(0.95) scaleY(0.95);opacity:.9;}
  100%{transform:scaleX(1.1) scaleY(1.1);opacity:1;}
}

/* Asap Dupa */
.smoke{
  position:fixed; border-radius:50%;
  background:rgba(255,220,150,0.3);
  animation:riseup 5s infinite ease-in;
  pointer-events:none; z-index:19;
}
@keyframes riseup{
  0%{transform:translateY(0) scale(1);opacity:0.4;}
  50%{transform:translateY(-120px) translateX(10px) scale(2.5);opacity:0.15;}
  100%{transform:translateY(-260px) translateX(-5px) scale(0.8);opacity:0;}
}

/* ── HEADER ── */
.header {
  position:fixed; top:0; left:0; right:0; z-index:20;
  padding:16px 15px;
  background:linear-gradient(180deg, rgba(12,5,1,0.9) 0%, transparent 100%);
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.header .h-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,0.5),transparent);}
.header .h-text{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:5px;color:#FFD700;text-shadow:0 0 10px rgba(255,215,0,0.4);white-space:nowrap;font-weight:700;}
.header .h-flame{font-size:1.1rem;}

/* ── WADAH UTAMA SCREEN (SCROLLABLE ELASTATIS) ── */
.main {
  position:relative; z-index:10;
  height:100vh;
  width:100%;
  display:flex; flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:75px 16px 80px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* ── KARTU ALTAR UTAMA (DIPAKSA LEBAR & MEGAH) ── */
.deity-card {
  width: 90vw; /* Menggunakan persentase viewport HP agar gambar otomatis melebar maksimal */
  max-width: 420px; /* Batas atas untuk layar tablet/lebar */
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}

/* Label hari */
.day-label {
  font-family:'Cinzel',serif;
  font-size:0.78rem;
  letter-spacing:4px;
  color:#FFD700;
  text-align:center;
  margin-bottom:15px;
  text-shadow:0 0 12px rgba(255,215,0,0.6), 0 2px 4px rgba(0,0,0,0.9);
  font-weight:700;
}

/* ── FRAME GAMBER DEWA (UKURAN JAUH LEBIH BESAR) ── */
.deity-frame {
  position:relative;
  width: 100%; /* Memaksa frame mengikuti lebar 90vw dari kartu pembungkus */
  aspect-ratio: 3 / 4.2; /* Menjaga presisi rasio portrait */
  margin-bottom: 15px;
}

/* Efek lingkaran cahaya suci di balik foto */
.deity-glow {
  position:absolute;
  inset:-30px;
  background:radial-gradient(circle, rgba(255,195,50,0.35) 0%, transparent 70%);
  border-radius:50%;
  z-index:0;
  animation:pulse-glow 2.5s infinite alternate ease-in-out;
}
@keyframes pulse-glow{
  0%{transform:scale(0.95);opacity:0.6;}
  100%{transform:scale(1.06);opacity:1;}
}

/* Bingkai Foto Dewa */
.deity-img-wrap {
  position:relative; z-index:2;
  width:100%; height:100%;
  border-radius:14px;
  overflow:hidden;
  border: 2px solid #d4af37; /* Border emas tebal melingkar */
  box-shadow:
    0 0 25px rgba(212,175,55,0.4),
    0 15px 45px rgba(0,0,0,0.95);
}
.deity-img-wrap img {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  transition:opacity 0.6s ease;
}
/* Efek bayangan gelap di area kaki/bawah foto */
.deity-img-wrap::after {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0; height:35%;
  background:linear-gradient(to top, rgba(12,5,1,1) 0%, transparent 100%);
  z-index:3; pointer-events:none;
}

/* Ornamen Klasik di Sisi Sudut Frame */
.fc { position:absolute; font-size:1.1rem; color:#FFD700; z-index:5; text-shadow:0 0 8px rgba(255,215,0,0.7); }
.fc.tl{top:8px;left:10px;} .fc.tr{top:8px;right:10px;transform:scaleX(-1);}
.fc.bl{bottom:8px;left:10px;transform:scaleY(-1);} .fc.br{bottom:8px;right:10px;transform:scale(-1);}

/* Arch Lingkaran Emas Gajah di Atas */
.arch-overlay {
  position:absolute; top:-4px; left:-1px; right:-1px; z-index:6; pointer-events:none;
}
.arch-overlay svg { width:100%; display:block; }

/* ── ZONE INFORMASI DAN NARASI ── */
.deity-info {
  width:100%;
  text-align:center;
  padding:5px 0 0;
  position:relative; z-index:5;
}

.deity-name {
  font-family:'Cinzel',serif;
  font-size: 1.4rem; /* Ukuran font nama dewa diperbesar signifikan */
  font-weight:900;
  color:#FFD700;
  text-shadow:0 0 20px rgba(255,215,0,0.6), 0 2px 6px rgba(0,0,0,0.95);
  letter-spacing:2px;
  line-height:1.2;
  margin-bottom:6px;
}
.deity-planet {
  font-size:0.8rem;
  letter-spacing:3px;
  color:rgba(212,175,55,0.85);
  margin-bottom:14px;
  font-weight:600;
}

/* Wadah Teks Deskripsi (Sangat Kontras dan Jelas) */
.deity-desc-wrap {
  position:relative;
  padding:15px 18px;
  background: rgba(15, 6, 2, 0.88); /* Latar gelap pekat agar teks terbaca tajam */
  border: 1px solid rgba(212,175,55,0.4);
  border-radius:10px;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.75);
}
.deity-desc-wrap::before, .deity-desc-wrap::after {
  content:'✦';
  position:absolute;
  top:50%; transform:translateY(-50%);
  font-size:0.7rem;
  color:#FFD700;
  opacity:0.6;
}
.deity-desc-wrap::before{left:8px;}
.deity-desc-wrap::after{right:8px;}

.deity-desc {
  font-size:0.92rem;
  line-height:1.6;
  color:#f0e2c1;
  font-style:italic;
  text-align: justify; /* Rata kanan kiri agar terlihat rapi seperti kitab suci */
}

/* Garis Batas Pembatas */
.divider {
  text-align:center;
  color:rgba(255,215,0,0.35);
  font-size:0.7rem;
  letter-spacing:12px;
  padding:16px 0;
  width:100%;
}

/* ── PRESET TOMBOL PREMIUM AUDIO ── */
.audio-row {
  display:flex; gap:12px;
  width:100%;
  margin-bottom: 20px;
}
.btn {
  flex:1;
  font-family:'Cinzel',serif;
  font-size:0.78rem;
  font-weight:700;
  letter-spacing:2px;
  padding:15px 10px;
  border-radius:50px;
  border:1.5px solid #d4af37;
  background: linear-gradient(180deg, #241205 0%, #120701 100%);
  color:#FFD700;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow:0 6px 20px rgba(0,0,0,0.6);
}
.btn:active{transform:scale(0.95);}
.btn.playing{
  background: linear-gradient(180deg, #052e16 0%, #021408 100%);
  border-color:#00ff99;
  color:#00ff99;
  box-shadow:0 0 20px rgba(0,255,153,0.3);
  text-shadow: 0 0 5px rgba(0,255,153,0.5);
}

/* ── FOOTER ── */
.footer {
  position:fixed; bottom:0; left:0; right:0; z-index:20;
  padding:12px 15px;
  background:linear-gradient(0deg, rgba(12,5,1,0.95) 0%, transparent 100%);
  text-align:center;
  font-family:'Cinzel',serif;
  font-size:0.6rem;
  letter-spacing:3px;
  color:rgba(212,175,55,0.45);
  font-weight:700;
}

/* Sembunyikan scrollbar bawaan browser sistem */
.main::-webkit-scrollbar{display:none;}
.main{-ms-overflow-style:none;scrollbar-width:none;}
</style>
</head>
<body>

<div class="bg-temple"></div>
<div class="bg-overlay"></div>

<div class="header">
  <div class="h-line"></div>
  <span class="h-flame">🪔</span>
  <div class="h-text">ALTAR KOSMIK HARIAN NAVAGRAHA</div>
  <span class="h-flame" style="animation-delay:.7s">🪔</span>
  <div class="h-line"></div>
</div>

<div class="candle-wrap cl">
  <div class="c-halo"></div>
  <div class="c-flame"></div>
  <div class="c-wax"></div>
  <div class="c-base"></div>
</div>

<div class="candle-wrap cr">
  <div class="c-halo"></div>
  <div class="c-flame" style="animation-delay:.5s"></div>
  <div class="c-wax"></div>
  <div class="c-base"></div>
</div>

<div class="smoke" style="width:5px;height:5px;left:10%;bottom:110px;animation-delay:0s"></div>
<div class="smoke" style="width:4px;height:4px;left:13%;bottom:110px;animation-delay:2s"></div>
<div class="smoke" style="width:5px;height:5px;right:10%;bottom:110px;animation-delay:1s"></div>
<div class="smoke" style="width:4px;height:4px;right:13%;bottom:110px;animation-delay:3s"></div>

<div class="main">
  <div class="deity-card">

    <div class="day-label" id="altar-day-label">— HARI —</div>

    <div class="deity-frame">
      <div class="deity-glow"></div>
      <div class="deity-img-wrap">
        <span class="fc tl">❧</span>
        <span class="fc tr">❧</span>
        <span class="fc bl">❧</span>
        <span class="fc br">❧</span>
        <img id="altar-img" src="" alt="Murthi">
      </div>
      <div class="arch-overlay">
        <svg viewBox="0 0 280 50" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ag" x1="0" x2="1" y1="0" y2="0">
              <stop offset="0%" stop-color="#8B6914" stop-opacity=".4"/>
              <stop offset="50%" stop-color="#FFD700" stop-opacity=".7"/>
              <stop offset="100%" stop-color="#8B6914" stop-opacity=".4"/>
            </linearGradient>
          </defs>
          <path d="M0,50 L0,30 Q140,-10 280,30 L280,50 Z" fill="rgba(5,2,0,0)" stroke="url(#ag)" stroke-width="1.5"/>
          <path d="M8,50 L8,33 Q140,0 272,33 L272,50" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
          <circle cx="140" cy="3" r="4" fill="#FFD700" fill-opacity=".55"/>
          <circle cx="140" cy="3" r="2" fill="#fff" fill-opacity=".4"/>
          <circle cx="50" cy="40" r="2.5" fill="#FFD700" fill-opacity=".3"/>
          <circle cx="230" cy="40" r="2.5" fill="#FFD700" fill-opacity=".3"/>
          <text x="140" y="36" text-anchor="middle" font-size="13" fill="rgba(212,175,55,0.4)">🕉</text>
        </svg>
      </div>
    </div>

    <div class="deity-info">
      <div class="deity-name" id="altar-name">Memanggil Energi…</div>
      <div class="deity-planet" id="altar-planet">— ✦ —</div>
      <div class="deity-desc-wrap">
        <div class="deity-desc" id="altar-desc">Menghubungkan dengan energi kosmik alam semesta...</div>
      </div>
    </div>

    <div class="divider">⸻ ✦ ⸻</div>

    <div class="audio-row">
      <button class="btn" id="btn-bell"  onclick="toggleAudio('bell')">🔔 GENTA</button>
      <button class="btn" id="btn-chant" onclick="toggleAudio('chant')">🕉️ MANTRA</button>
    </div>

  </div>
</div>

<div class="footer">OM NAMAH SHIVAYA &nbsp;✦&nbsp; OM SHARAVANABHAVA &nbsp;✦&nbsp; OM NAMO NARAYANAYA</div>

<audio id="audio-bell"  src="bell.mp3"   loop></audio>
<audio id="audio-chant" src="chants.mp3" loop></audio>

<script src="images.js"></script>
<script>
// ═══════════════════════════════════
// DATA SUCI ASLI — NAVAGRAHA TAMIL HINDU (Sama Sekali Tidak Diubah)
// ═══════════════════════════════════
const weeklyDeities = [
  {
    day: "MINGGU — ADITYA VAARAM",
    planet: "☀️ Surya · Planet Matahari",
    name: "Lord Surya Bhagavan",
    file: "af5bf4deb785d53689f28ef059ac321a.jpg",
    desc: "Hari Minggu dinaungi Surya Deva, sang Raja Matahari yang menunggangi kereta api tujuh kuda putih. Surya adalah sumber segala cahaya, jiwa alam semesta, dan pemberi kehidupan. Memuja Surya pada hari ini mendatangkan kesehatan, kejayaan, kecemerlangan karier, dan mengusir kegelapan dari kehidupan kita."
  },
  {
    day: "SENIN — THINGAL VAARAM",
    planet: "🌙 Chandra · Planet Bulan",
    name: "Lord Shiva Chandrashekhara",
    file: "ba3e9b1e1b1ee8053c1474c5fad805e8.jpg",
    desc: "Senin adalah hari suci Chandra, bulan yang bersemayam agung di mahkota Siwa. Siwa sebagai Chandrashekhara adalah penguasa pikiran, perasaan, dan alam bawah sadar. Pemujaan pada hari Senin menenangkan pikiran yang bergejolak, menyembuhkan luka batin, memperkuat ikatan keluarga, dan mendatangkan kedamaian batin yang abadi."
  },
  {
    day: "SELASA — SEVVAI VAARAM",
    planet: "🔴 Mangala · Planet Mars",
    name: "Lord Murugan Kartikeya",
    file: "f19be3427da0fcb68fc6a02949e243c7.jpg",
    desc: "Selasa dinaungi Mangala, energi Mars yang membara dengan keberanian. Murugan Kartikeya, putra suci Siwa dan Parvati, adalah Dewa Perang, Kemenangan, dan Kebijaksanaan Muda. Pemujaan pada hari Selasa memberikan keberanian dalam menghadapi cobaan, mengusir musuh dan energi negatif, serta memberi kemenangan dalam setiap perjuangan hidup."
  },
  {
    day: "RABU — BUDHAN VAARAM",
    planet: "💚 Budha · Planet Merkurius",
    name: "Lord Ganesha Vinayaka",
    file: "0fb14a044daba941af4113c99a8d0b1e.jpg",
    desc: "Rabu adalah hari Budha, planet kecerdasan, komunikasi, dan perdagangan. Ganesha Vinayaka sebagai Dewa Kebijaksanaan dan Penghapus Segala Rintangan adalah perwujudan sempurna energi Budha. Memuja Ganesha pada hari Rabu mempertajam kecerdasan, memperlancar komunikasi, membuka pintu rezeki, dan memberkati setiap awal usaha baru."
  },
  {
    day: "KAMIS — VYAAZHAN VAARAM",
    planet: "🌟 Guru · Planet Jupiter",
    name: "Lord Dakshinamurthy",
    file: "416a11d41e60007185696a7bd95e70da.jpg",
    desc: "Kamis adalah hari Guru Brihaspati, Jupiter yang agung — planet ilmu pengetahuan, dharma, dan kebijaksanaan tertinggi. Dakshinamurthy adalah wujud Siwa sebagai Guru Semesta yang mengajarkan kebenaran abadi melalui keheningan. Pemujaan hari Kamis mendatangkan kebijaksanaan sejati, berkah guru, kemuliaan spiritual, dan kesuksesan dalam ilmu dan pendidikan."
  },
  {
    day: "JUMAT — VELLI VAARAM",
    planet: "💎 Shukra · Planet Venus",
    name: "Goddess Mahalakshmi",
    file: "c9fcc50c5a64872c3c3aa29de8321fc2.jpg",
    desc: "Jumat dinaungi Shukra, Venus yang memberkahi keindahan, kemakmuran, dan keharmonisan. Mahalakshmi sebagai Dewi Kemakmuran, Keberuntungan, dan Keanggunan adalah manifestasi tertinggi energi Shukra. Memuja Lakshmi pada hari Jumat mendatangkan rezeki yang tak putus, keindahan jiwa, keharmonisan dalam cinta dan rumah tangga, serta kemewahan yang berkelanjutan."
  },
  {
    day: "SABTU — SANI VAARAM",
    planet: "⚫ Shani · Planet Saturnus",
    name: "Lord Shani Bhagavan",
    file: "087d59920dc37165b42699e5834de57b.jpg",
    desc: "Sabtu adalah hari Shani yang agung, hakim karma alam semesta. Shani Bhagavan memberikan buah setimpal dari setiap perbuatan — baik maupun buruk. Memuja Shani pada hari Sabtu dengan hati yang tulus akan melindungi dari karma buruk masa lalu, meringankan cobaan hidup, mempercepat keadilan, dan mendatangkan ketabahan serta disiplin sejati dalam menjalani dharma."
  }
];

function initAltar() {
  const dayIndex = new Date().getDay(); // 0=Minggu
  const deity = weeklyDeities[dayIndex];

  document.getElementById("altar-day-label").innerText = deity.day;
  document.getElementById("altar-name").innerText      = deity.name;
  document.getElementById("altar-planet").innerText    = deity.planet;
  document.getElementById("altar-desc").innerText      = deity.desc;

  const img = document.getElementById("altar-img");
  img.style.opacity = "0";
  img.src = deity.file;
  img.onload  = function(){ img.style.opacity = "1"; };
  img.onerror = function(){
    if(typeof altarImages !== 'undefined'){
      const idx = (new Date().getDate() - 1) % altarImages.length;
      img.src = altarImages[idx].file;
      img.style.opacity = "1";
    }
  };
}

function toggleAudio(id) {
  const audio = document.getElementById("audio-" + id);
  const btn   = document.getElementById("btn-"   + id);
  if(audio.paused){
    audio.play().catch(function(){ alert("Tap layar dulu untuk izinkan audio!"); });
    btn.classList.add("playing");
    btn.innerText = "🛑 HENTIKAN";
  } else {
    audio.pause();
    btn.classList.remove("playing");
    btn.innerText = id === 'bell' ? "🔔 GENTA" : "🕉️ MANTRA";
  }
}

window.onload = initAltar;
</script>
</body>
</html>
