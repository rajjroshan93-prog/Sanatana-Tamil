<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altar Kosmik Harian Navagraha</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

html, body {
  height:100%;
  overflow:hidden;
}

body {
  font-family:'Crimson Text',Georgia,serif;
  color:#e8d5a3;
  position:relative;
  width:100%;
  height:100%;
}

/* ── BACKGROUND KUIL (DIPINDAHKAN PAS AGAR PINTU DI TENGAH LAYAR) ── */
.bg-temple {
  position:fixed;
  inset:0;
  z-index:0;
  background-image: url('IMG_20260622_160050.png');
  background-size:cover;
  /* Mengubah posisi background agar gambar kuil bergeser pas ke tengah-tengah vertikal */
  background-position: center 40%; 
  background-repeat:no-repeat;
  filter:brightness(0.55) saturate(1.1);
}
/* Overlay gelap halus supaya dewa menonjol */
.bg-overlay {
  position:fixed;
  inset:0;
  z-index:1;
  background:
    radial-gradient(ellipse 55% 65% at 50% 45%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 100%),
    linear-gradient(180deg, rgba(10,4,0,0.45) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.1) 60%, rgba(10,4,0,0.6) 100%);
}

/* ── LILIN PREMIUM ── */
.candle-wrap {
  position:fixed; bottom:28px; z-index:20;
  display:flex; flex-direction:column; align-items:center;
}
.candle-wrap.cl{left:6px;} .candle-wrap.cr{right:6px;}
.c-halo{width:30px;height:55px;background:radial-gradient(ellipse at 50% 90%,rgba(255,160,30,0.55) 0%,transparent 70%);margin-bottom:-12px;}
.c-flame{width:11px;height:22px;background:radial-gradient(ellipse at 50% 70%,#fff 0%,#ffe566 30%,#ff8800 70%,transparent 100%);border-radius:50% 50% 30% 30%;animation:flicker 1.1s infinite alternate;filter:blur(.3px);position:relative;z-index:2;}
.c-wax{width:15px;height:70px;background:linear-gradient(135deg,#e8d5a3 0%,#fffbe8 45%,#c9a96e 100%);border-radius:3px 3px 1px 1px;box-shadow:0 0 12px rgba(255,200,50,0.3);}
.c-base{width:21px;height:8px;background:linear-gradient(90deg,#7a5810,#FFD700,#7a5810);border-radius:2px;}

@keyframes flicker{
  0%{transform:scaleX(1) scaleY(1);opacity:.95;}
  25%{transform:scaleX(.82) scaleY(1.12);opacity:1;}
  55%{transform:scaleX(1.1) scaleY(.9);opacity:.86;}
  80%{transform:scaleX(.9) scaleY(1.08);opacity:.97;}
  100%{transform:scaleX(1.05) scaleY(.96);opacity:.91;}
}

/* Asap dupa */
.smoke{
  position:fixed; border-radius:50%;
  background:rgba(255,215,130,0.4);
  animation:riseup 4.5s infinite ease-in;
  pointer-events:none; z-index:19;
}
@keyframes riseup{
  0%{transform:translateY(0) translateX(0) scale(1);opacity:.5;}
  50%{transform:translateY(-90px) translateX(5px) scale(2);opacity:.22;}
  100%{transform:translateY(-200px) translateX(-3px) scale(.4);opacity:0;}
}

/* ── HEADER ── */
.header {
  position:fixed; top:0; left:0; right:0; z-index:20;
  padding:12px 20px 10px;
  background:linear-gradient(180deg,rgba(8,3,0,0.75) 0%,transparent 100%);
  display:flex; align-items:center; justify-content:center; gap:14px;
}
.header .h-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.5),transparent);}
.header .h-text{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:6px;color:rgba(212,175,55,0.6);white-space:nowrap;}
.header .h-flame{font-size:1.2rem;animation:flicker 1.8s infinite alternate;}

/* ── KONTEN UTAMA (DIATUR SUPAYA PAS MENGIKUTI POSISI PINTU TENGAH KEDUA PILAR) ── */
.main {
  position:relative; z-index:10;
  height:100vh;
  display:flex; flex-direction:column;
  align-items:center;
  justify-content: flex-start;
  padding: 135px 12px 65px; /* Menurunkan konten agar pas di tengah lubang pintu kuil */
  gap:0;
  overflow-y:auto;
}

/* Kartu Dewa utama */
.deity-card {
  width:100%; max-width:320px;
  display:flex; flex-direction:column; align-items:center;
  gap:0;
  position:relative;
}

/* Label hari */
.day-label {
  font-family:'Cinzel',serif;
  font-size:.68rem;
  letter-spacing:5px;
  color:rgba(212,175,55,0.75);
  text-align:center;
  margin-bottom:10px;
  text-shadow:0 0 15px rgba(255,215,0,0.5), 0 1px 4px rgba(0,0,0,0.9);
}

/* Frame gambar dewa — Letak foto pas masuk di tengah pintu gerbang */
.deity-frame {
  position:relative;
  width:100%; max-width:215px; /* Lebar disesuaikan dengan proporsi pintu gerbang belakang */
  aspect-ratio:3/4.2;
  margin-bottom: 12px;
}

/* Glow cahaya di belakang gambar dewa */
.deity-glow {
  position:absolute;
  inset:-18px;
  background:radial-gradient(ellipse at 50% 50%, rgba(255,180,30,0.22) 0%, transparent 65%);
  border-radius:50%;
  z-index:0;
  animation:pulse-glow 3s infinite alternate;
}
@keyframes pulse-glow{
  0%{opacity:.7;transform:scale(1);}
  100%{opacity:1;transform:scale(1.05);}
}

/* Pembungkus gambar dewa */
.deity-img-wrap {
  position:relative; z-index:2;
  width:100%; height:100%;
  border-radius:8px;
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(212,175,55,0.3),
    0 0 30px rgba(180,90,0,0.4),
    0 8px 40px rgba(0,0,0,0.7);
}
.deity-img-wrap img {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  transition:opacity .7s ease;
}
/* Efek bayangan gelap bagian bawah gambar */
.deity-img-wrap::after {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0; height:45%;
  background:linear-gradient(to top, rgba(5,2,0,0.92) 0%, transparent 100%);
  z-index:3; pointer-events:none;
}

/* Simbol ukiran sudut bingkai */
.fc { position:absolute; font-size:.9rem; color:rgba(212,175,55,0.7); z-index:5; text-shadow:0 0 6px rgba(255,215,0,0.5); }
.fc.tl{top:5px;left:7px;} .fc.tr{top:5px;right:7px;transform:scaleX(-1);}
.fc.bl{bottom:5px;left:7px;transform:scaleY(-1);} .fc.br{bottom:5px;right:7px;transform:scale(-1);}

/* Lengkungan atap kubah di atas bingkai foto */
.arch-overlay {
  position:absolute; top:-1px; left:-1px; right:-1px; z-index:6; pointer-events:none;
}
.arch-overlay svg { width:100%; display:block; }

/* ── AREA INFORMASI TEXT ── */
.deity-info {
  width:100%; max-width:310px;
  text-align:center;
  padding:14px 4px 0;
  position:relative; z-index:5;
}

.deity-name {
  font-family:'Cinzel',serif;
  font-size:1.1rem;
  font-weight:700;
  color:#FFD700;
  text-shadow:0 0 25px rgba(255,215,0,0.6), 0 2px 8px rgba(0,0,0,0.95);
  letter-spacing:1.5px;
  line-height:1.3;
  margin-bottom:4px;
}
.deity-planet {
  font-size:.72rem;
  letter-spacing:3px;
  color:rgba(212,175,55,0.65);
  margin-bottom:10px;
}

/* Pembungkus narasi kitab suci */
.deity-desc-wrap {
  position:relative;
  padding:12px 16px;
  background:rgba(5,2,0,0.72);
  border:1px solid rgba(180,120,20,0.3);
  border-radius:6px;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
}
.deity-desc-wrap::before, .deity-desc-wrap::after {
  content:'✦';
  position:absolute;
  top:50%; transform:translateY(-50%);
  font-size:.6rem;
  color:rgba(212,175,55,0.35);
}
.deity-desc-wrap::before{left:6px;}
.deity-desc-wrap::after{right:6px;}

.deity-desc {
  font-size:.88rem;
  line-height:1.7;
  color:#c9a96e;
  font-style:italic;
  text-align:left;
}

/* Pembatas tengah */
.divider {
  text-align:center;
  color:rgba(180,120,20,0.4);
  font-size:.65rem;
  letter-spacing:8px;
  padding:10px 0 8px;
  width:100%; max-width:310px;
}

/* Area Tombol-Tombol Altar Interaktif */
.audio-row {
  display:flex; 
  flex-direction:column; /* Diubah jadi kolom ke bawah agar muat ditambah tombol ketiga */
  gap:10px;
  width:100%; max-width:310px;
}
.audio-buttons-sub {
  display:flex;
  gap:10px;
  width:100%;
}
.btn {
  flex:1;
  font-family:'Cinzel',serif;
  font-size:.7rem;
  font-weight:700;
  letter-spacing:2px;
  padding:12px 6px;
  border-radius:50px;
  border:1px solid rgba(180,120,20,0.55);
  background:rgba(20,8,1,0.8);
  color:#d4af37;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all .3s ease;
  box-shadow:0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,215,0,0.07);
  backdrop-filter:blur(4px);
}
.btn:active{transform:scale(.96);}
.btn.playing{
  background:rgba(5,30,18,0.85);
  border-color:rgba(0,210,120,0.55);
  color:#00e68a;
  box-shadow:0 0 18px rgba(0,210,120,0.18);
}
/* Style tombol khusus ke Purana Kitab Suci */
.btn-purana {
  background: linear-gradient(180deg, #44300a 0%, rgba(20,8,1,0.9) 100%);
  border-color: #FFD700;
  color: #fff;
  text-shadow: 0 0 5px rgba(255,215,0,0.6);
  box-shadow: 0 4px 22px rgba(255,215,0,0.15);
}
/* Style tombol baru khusus ke Jyotish Horoskop */
.btn-jyotish {
  background: linear-gradient(180deg, #1f0f42 0%, rgba(10,4,28,0.95) 100%);
  border-color: #a876ff;
  color: #e5d4ff;
  text-shadow: 0 0 5px rgba(168,118,255,0.6);
  box-shadow: 0 4px 22px rgba(168,118,255,0.15);
}

/* ── ADDON: STYLE BARU KHUSUS UNTUK LANGUAGE SWITCHER ── */
.lang-switcher-altar {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 12px;
  width: 100%;
  max-width: 310px;
  position: relative;
  z-index: 25;
}
.btn-lang-altar {
  background: rgba(20, 8, 1, 0.6);
  border: 1px solid rgba(212, 175, 55, 0.3);
  color: #c9a96e;
  padding: 5px 12px;
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 1px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.3s ease;
}
.btn-lang-altar.active {
  background: linear-gradient(180deg, #44300a 0%, #120602 100%);
  border-color: #FFD700;
  color: #FFD700;
  box-shadow: 0 0 10px rgba(255, 215, 0, 0.25);
}

/* ── FOOTER LAYAR ── */
.footer {
  position:fixed; bottom:0; left:0; right:0; z-index:20;
  padding:8px 20px 10px;
  background:linear-gradient(0deg,rgba(8,3,0,0.7) 0%,transparent 100%);
  text-align:center;
  font-family:'Cinzel',serif;
  font-size:.58rem;
  letter-spacing:4px;
  color:rgba(180,120,20,0.4);
}

.main::-webkit-scrollbar{display:none;}
.main{-ms-overflow-style:none;scrollbar-width:none;}
</style>
</head>

    <div class="audio-row">

    </div>

  </div>
</div>

<div class="footer">OM NAMAH SHIVAYA &nbsp;✦&nbsp; OM SHARAVANABHAVA &nbsp;✦&nbsp; OM NAMO NARAYANAYA</div>

// DATA UI TEKS STATIS
const altarUiTranslations = {
  id: {
    header: "ALTAR KOSMIK HARIAN NAVAGRAHA",
    purana: "📜 BUKA PURANA KOSMIK",
    jyotish: "✨ RUANG JYOTISH HOROSKOP",
    kalender: "📅 TAMIL KOSMIK PANCHANGAM",
    bell: "🔔 GENTA",
    chant: "🕉️ MANTRA",
    stop: "🛑 HENTIKAN"
  },
  en: {
    header: "DAILY NAVAGRAHA COSMIC ALTAR",
    purana: "📜 OPEN COSMIC PURANA",
    jyotish: "✨ JYOTISH HOROSCOPE ROOM",
    kalender: "📅 TAMIL COSMIC PANCHANGAM",
    bell: "🔔 BELL",
    chant: "🕉️ CHANT",
    stop: "🛑 STOP"
  }
};

let altarCurrentLang = 'id';

function initAltar() {
  const dayIndex = new Date().getDay(); // 0=Minggu
  
  // Ambil data berdasarkan bahasa yang aktif
  const deity = (altarCurrentLang === 'id') ? weeklyDeities[dayIndex] : weeklyDeitiesEnglish[dayIndex];

  document.getElementById("altar-day-label").innerText = deity.day;
  document.getElementById("altar-name").innerText      = deity.name;
  document.getElementById("altar-planet").innerText    = deity.planet;
  document.getElementById("altar-desc").innerText      = deity.desc;

  // Render gambar (tetap menggunakan file gambar bawaan asli)
  const img = document.getElementById("altar-img");
  img.style.opacity = "0";
  img.src = weeklyDeities[dayIndex].file; 
  img.onload  = function(){ img.style.opacity = "1"; };
  img.onerror = function(){
    if(typeof altarImages !== 'undefined'){
      const idx = (new Date().getDate() - 1) % altarImages.length;
      img.src = altarImages[idx].file;
      img.style.opacity = "1";
    }
  };
}

// ── ADDON: FUNGSI UNTUK PERALIHAN BAHASA SECARA DINAMIS ──
function switchAltarLanguage(lang) {
  altarCurrentLang = lang;
  
  // Update class active tombol switcher
  document.getElementById("altar-lang-id").classList.remove("active");
  document.getElementById("altar-lang-en").classList.remove("active");
  document.getElementById("altar-lang-" + lang).classList.add("active");
  
  // Ganti teks UI Statis
  document.getElementById("ui-header-text").innerText = altarUiTranslations[lang].header;
  document.getElementById("btn-text-purana").innerText = altarUiTranslations[lang].purana;
  document.getElementById("btn-text-jyotish").innerText = altarUiTranslations[lang].jyotish;
  document.getElementById("btn-text-kalender").innerText = altarUiTranslations[lang].kalender;
  
  // Ganti nama tombol audio jika sedang tidak memutar musik
  const audioBell = document.getElementById("audio-bell");
  const audioChant = document.getElementById("audio-chant");
  if(audioBell.paused) document.getElementById("btn-bell").innerText = altarUiTranslations[lang].bell;
  if(audioChant.paused) document.getElementById("btn-chant").innerText = altarUiTranslations[lang].chant;

  // Refresh isi konten ramalan harian sesuai bahasa terpilih
  initAltar();
}

function toggleAudio(id) {
  const audio = document.getElementById("audio-" + id);
  const btn   = document.getElementById("btn-"   + id);
  if(audio.paused){
    audio.play().catch(function(){ alert("Tap layar dulu untuk izinkan audio!"); });
    btn.classList.add("playing");
    btn.innerText = altarUiTranslations[altarCurrentLang].stop;
  } else {
    audio.pause();
    btn.classList.remove("playing");
    btn.innerText = id === 'bell' ? altarUiTranslations[altarCurrentLang].bell : altarUiTranslations[altarCurrentLang].chant;
  }
}

window.onload = initAltar;
</script>
