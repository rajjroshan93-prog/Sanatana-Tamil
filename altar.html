<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altar Kosmik Harian Navagraha</title>
    <style>
        :root {
            --gold: #FFD700;
            --dark-bg: #0d0d0d;
            --panel-bg: rgba(20, 20, 20, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #2c1604 0%, #050505 100%);
            padding: 20px;
        }

        .altar-container {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            border: 3px solid #4a3319;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.15);
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .altar-container::after {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border: 1px solid var(--gold);
            border-radius: 30px;
            opacity: 0.25;
            pointer-events: none;
        }

        .day-indicator {
            font-size: 0.95rem;
            color: #d1b49e;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .image-frame {
            width: 100%;
            height: 450px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #3a2510;
            background-color: #000;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9), 0 5px 15px rgba(0,0,0,0.5);
        }

        .image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .deity-info h1 {
            font-size: 1.6rem;
            color: var(--gold);
            text-shadow: 0 2px 5px rgba(0,0,0,0.9);
            letter-spacing: 1px;
        }

        .audio-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            background: linear-gradient(135deg, #4a2f13 0%, #211204 100%);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 14px 10px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(135deg, var(--gold) 0%, #d4af37 100%);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transform: translateY(-2px);
        }

        .btn.active {
            background: linear-gradient(135deg, #00ffcc 0%, #008866 100%);
            color: #000;
            border-color: #00ffcc;
        }
    </style>
</head>
<body>

    <div class="altar-container">
        <div class="day-indicator" id="altar-day-label">Siklus Murthi Hari --</div>
        
        <div class="image-frame">
            <img id="altar-img" src="" alt="Loading Murthi...">
        </div>
        
        <div class="deity-info">
            <h1 id="altar-name">Memanggil Energi...</h1>
        </div>

        <div class="audio-controls">
            <button class="btn" id="btn-bell" onclick="toggleAudio('bell')">🔔 Bunyikan Genta</button>
            <button class="btn" id="btn-chant" onclick="toggleAudio('chant')">🕉️ Putar Mantra</button>
        </div>
    </div>

    <audio id="audio-bell" src="bell.mp3" loop></audio>
    <audio id="audio-chant" src="chants.mp3" loop></audio>

    <script src="images.js"></script>

    <script>
        function initAltar() {
            const today = new Date();
            const currentDayNumber = today.getDate();
            
            // Mengambil data dari array di dalam file images.js
            const targetIndex = (currentDayNumber - 1) % altarImages.length;
            const currentMurthi = altarImages[targetIndex];

            document.getElementById("altar-day-label").innerText = `Siklus Murthi Hari ke-${currentDayNumber}`;
            document.getElementById("altar-img").src = currentMurthi.file;
            document.getElementById("altar-img").alt = currentMurthi.name;
            document.getElementById("altar-name").innerText = currentMurthi.name;
        }

        function toggleAudio(id) {
            const audioEl = document.getElementById(`audio-${id}`);
            const btnEl = document.getElementById(`btn-${id}`);

            if (audioEl.paused) {
                audioEl.play().catch(err => alert("Klik area layar mana saja dulu untuk izinkan audio!"));
                btnEl.classList.add("active");
                if (id === 'bell') btnEl.innerText = "🛑 Hentikan Genta";
                if (id === 'chant') btnEl.innerText = "🛑 Hentikan Mantra";
            } else {
                audioEl.pause();
                btnEl.classList.remove("active");
                if (id === 'bell') btnEl.innerText = "🔔 Bunyikan Genta";
                if (id === 'chant') btnEl.innerText = "🕉️ Putar Mantra";
            }
        }

        window.onload = initAltar;
    </script>
</body>
</html>
