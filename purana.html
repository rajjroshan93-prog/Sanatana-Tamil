      <p>Dalam sains astrologi perbintangan Jyotish, Shani memimpin planet Saturnus yang menguasai zodiak Capricorn (Makara) dan Aquarius (Kumbha). Sifat alaminya adalah dingin, lambat, and penuh disiplin ketat. Shani bertindak sebagai indikator utama dari elemen batasan waktu, usia umur panjang manusia, kerja keras tanpa mengeluh, kedewasaan mental spiritual, penundaan rezeki, and asketisme sunyi. Ketika seseorang memasuki fase astrologi <i>Sadhe Sati</i> (periode penempaan 7,5 tahun Saturnus), Shani sebenarnya tidak sedang menghancurkan orang tersebut, melainkan sedang memurnikan emas di dalam batinnya dari kotoran noda karma buruk masa lampau.</p>
      
      <h3>5. Tata Cara Pemujaan (Sadhana) Harian</h3>
      <p>Sadhana suci pembersihan diri bagi Shani Deva dilaksanakan secara khusyuk pada hari <b>Sabtu</b> (Shanivar). Langkah ritual terbaik adalah dengan pergi ke kuil lalu menyalakan lampu minyak yang menggunakan bahan bakar minyak wijen hitam (*Til Deepam*) di hadapan murthi Shani Deva atau pohon banyan. Sadhaka dianjurkan mengenakan pakaian bernuansa hitam atau biru tua pekat, duduk bermeditasi menghadap ke arah Barat, melantunkan Shani Gayatri Mantra, serta gemar memberi sedekah makanan kepada orang miskin, pekerja buruh kasar, and memberi makan burung gagak hitam atau anjing liar hitam demi memohon perlindungan dari mara bahaya, ketabahan mental, and kelonggaran sisa utang karma hidup.</p>
    `
  }

// LOGIKA UTUH JS - PERPINDAHAN VIEW HALAMAN & FILTER
// ═══════════════════════════════════════════════════════════════════════

function renderStories(filterPlanet) {
  const grid = document.getElementById("stories-grid");
  grid.innerHTML = "";

  navagrahaPurana.forEach((item, index) => {
    if (filterPlanet !== "ALL" && item.planet !== filterPlanet) {
      return; 
    }

    const card = document.createElement("div");
    card.className = "story-card";
    card.innerHTML = `
      <span class="sc-fc tl">❧</span>
      <span class="sc-fc tr">❧</span>
      <span class="sc-fc bl">❧</span>
      <span class="sc-fc br">❧</span>
      <div class="card-top">
        <div class="card-planet">${item.planet}</div>
        <div class="card-title">${item.title}</div>
        <div class="card-snippet">${item.snippet}</div>
      </div>
      <button class="card-btn" onclick="openBookView(${index})">BUKA KITAB SUCI 📜</button>
    `;
    grid.appendChild(card);
  });
}

function filterStories(planetName) {
  const buttons = document.querySelectorAll(".filter-btn");
  buttons.forEach(btn => btn.classList.remove("active"));
  
  if(event && event.target) {
    event.target.classList.add("active");
  }
  renderStories(planetName);
}

// FUNGSI UTAMA: MEMBUKA HALAMAN BARU FULLSCREEN GULUNGAN KITAB SUCI
function openBookView(index) {
  const data = navagrahaPurana[index];
  
  document.getElementById("b-planet").innerText = data.planet;
  document.getElementById("b-title").innerText  = data.title;
  document.getElementById("b-body").innerHTML   = data.fullStory;
  
  // Sembunyikan Halaman Utama Kartu
  document.getElementById("main-view").classList.add("hidden");
  
  // Tampilkan Halaman Baru Kitab Suci Fullscreen
  const bookView = document.getElementById("book-view");
  bookView.style.display = "block";
  setTimeout(() => {
    bookView.classList.add("active");
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 50);
}

// FUNGSI UTAMA: MENUTUP DAN KEMBALI KE VIEW KARTU
function closeBookView() {
  const bookView = document.getElementById("book-view");
  bookView.classList.remove("active");
  
  setTimeout(() => {
    bookView.style.display = "none";
    // Munculkan kembali halaman kartu utama
    document.getElementById("main-view").classList.remove("hidden");
  }, 400);
}

window.onload = function() {
  renderStories("ALL");
};
</script>
