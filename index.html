<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanatana Tamil - Istana Altar Suci Agung</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020100; }
    .font-serif-royal { font-family: 'Cinzel', serif; }
    .font-serif-ultra { font-family: 'Cinzel Decorative', serif; }
    
    /* Efek Gerakan Cahaya Pilar Altar (Sacred Cosmic Light) */
    @keyframes cosmicAura {
      0%, 100% { opacity: 0.15; transform: scale(1) translate(-5%, -5%); }
      50% { opacity: 0.38; transform: scale(1.15) translate(5%, 5%); }
    }
    .cosmic-blur { animation: cosmicAura 15s ease-in-out infinite; }

    /* Bingkai Kaca Emas Berlapis */
    .emperor-glow {
      box-shadow: 0 0 70px -10px rgba(217, 119, 6, 0.45), inset 0 0 50px rgba(217, 119, 6, 0.15);
    }
  </style>
</head>
<body class="text-stone-100 min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">

  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[800px] bg-gradient-to-b from-amber-500/15 via-orange-600/5 to-transparent rounded-full blur-[150px] cosmic-blur pointer-events-none"></div>

  <div id="welcomeScreen" class="w-full max-w-md bg-gradient-to-b from-stone-900/95 via-stone-950/90 to-stone-950/98 backdrop-blur-3xl border-2 border-amber-500/40 p-10 rounded-[3.5rem] text-center space-y-8 shadow-[0_40px_90px_-15px_rgba(0,0,0,1)] z-10 relative overflow-hidden emperor-glow">
    
    <div class="absolute top-6 left-6 w-8 h-8 border-t-2 border-l-2 border-amber-500/50 rounded-tl-xl"></div>
    <div class="absolute top-6 right-6 w-8 h-8 border-t-2 border-r-2 border-amber-500/50 rounded-tr-xl"></div>
    <div class="absolute bottom-6 left-6 w-8 h-8 border-b-2 border-l-2 border-amber-500/50 rounded-bl-xl"></div>
    <div class="absolute bottom-6 right-6 w-8 h-8 border-b-2 border-r-2 border-amber-500/50 rounded-br-xl"></div>

    <div class="space-y-3">
      <div class="text-[10px] tracking-[0.5em] uppercase font-black text-amber-500/90 font-serif-royal">Sanctum Portal</div>
      <h1 class="text-3xl sm:text-4xl font-black font-serif-ultra tracking-widest bg-clip-text text-transparent bg-gradient-to-b from-amber-100 via-amber-400 to-orange-500 drop-shadow-[0_4px_15px_rgba(0,0,0,0.8)]">
        SANATANA TAMIL
      </h1>
      <div class="flex items-center justify-center gap-3 py-1">
        <div class="h-[1px] w-16 bg-gradient-to-r from-transparent via-amber-500/50 to-transparent"></div>
        <div class="text-xs text-amber-500/70">🔱</div>
        <div class="h-[1px] w-16 bg-gradient-to-l from-transparent via-amber-500/50 to-transparent"></div>
      </div>
      <p class="text-stone-400 text-xs leading-relaxed font-light px-4">
        Gerbang Kebudayaan & Spiritualitas Tamil Kuno. Silakan verifikasi jiwa Anda untuk membuka Altar Suci.
      </p>
    </div>

    <div class="py-4 flex justify-center relative select-none">
      <div class="absolute inset-0 bg-gradient-to-r from-amber-500 to-orange-600 opacity-25 rounded-full blur-[45px] w-36 h-36 mx-auto animate-pulse"></div>
      
      <svg class="w-36 h-36 text-amber-400 filter drop-shadow-[0_0_30px_rgba(245,158,11,0.85)] transform hover:scale-105 transition-transform duration-700" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="44" stroke="currentColor" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.4"/>
        <circle cx="50" cy="50" r="38" stroke="currentColor" stroke-width="2" opacity="0.8"/>
        
        <path d="M 45 35 C 55 35, 60 45, 50 52 C 62 52, 65 68, 48 70 C 35 71, 32 62, 32 60 M 48 52 C 32 52, 33 42, 33 42 M 52 52 C 58 52, 66 56, 68 64 M 55 34 C 62 26, 74 34, 74 34 M 61 24 C 63 26, 66 24, 64 22 C 62 20, 59 22, 61 24" stroke="currentColor" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="space-y-4 pt-2 flex flex-col items-center justify-center">
      <div id="g_id_onload"
           data-client_id="574255599495-i8u0oipvdlb02dku2f34beqmfopueojn.apps.googleusercontent.com"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="handleCredentialResponse"
           data-auto_select="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-shape="pill"
           data-theme="filled_dark"
           data-text="signin_with"
           data-size="large"
           data-logo_alignment="left"
           data-width="320">
      </div>
      <p class="text-[9px] text-stone-500 tracking-[0.2em] uppercase font-bold">
        🔒 Sistem Keamanan Database Cloud Terverifikasi
      </p>
    </div>
  </div>

  <script>
    function parseJwt(token) {
      try {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
      } catch(e) { return null; }
    }

    window.handleCredentialResponse = function(response) {
      const responsePayload = parseJwt(response.credential);
      if (responsePayload) {
        console.log("User terverifikasi:", responsePayload.name);
        // Di sini nanti tempat kita menghubungkan ke fungsi dashboard buatanmu sendiri!
        alert("Selamat Datang di Sanatana Tamil, " + responsePayload.name + "!");
      }
    }
  </script>
</body>
</html>
